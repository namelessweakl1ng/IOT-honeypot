# sshd hardening — optional, apply to all three machines
# Edit /etc/ssh/sshd_config and ensure these settings:

Port 22
Protocol 2
PermitRootLogin no
PasswordAuthentication yes        # lab only; use no + keys in production
X11Forwarding no
MaxAuthTries 3
LoginGraceTime 30
AllowUsers labuser
ClientAliveInterval 300
ClientAliveCountMax 0

# Then:
# sudo systemctl restart ssh
