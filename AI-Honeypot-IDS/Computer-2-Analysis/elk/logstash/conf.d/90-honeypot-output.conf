# =============================================================================
# Logstash pipeline — 90-honeypot-output.conf
# Index into Elasticsearch with a daily-rolling index pattern.
# =============================================================================
output {
  if [container_name] or [honeypot][container_name] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      # Daily index — matches the index-template-honeypot.json pattern.
      index => "honeypot-logs-%{+YYYY.MM.dd}"
      # No auth in lab mode
      manage_template => false
      # ILM off for simplicity
      ilm_enabled => false
    }
  } else {
    # Anything that doesn't look like a honeypot event still gets indexed
    # under a generic catch-all so we don't lose data.
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "filebeat-%{+YYYY.MM.dd}"
      manage_template => false
      ilm_enabled => false
    }
  }
}
