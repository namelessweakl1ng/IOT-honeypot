# =============================================================================
# Logstash pipeline — 20-honeypot-filter.conf
# Parse + enrich the JSON events coming from Filebeat.
# =============================================================================
filter {
  # Only process events tagged as honeypot (or that look like our schema)
  if [container_name] or [honeypot][container_name] {

    # 1. Flatten the decoded JSON "honeypot" object into top-level fields
    #    (Filebeat's decode_json_fields put it under "honeypot").
    if [honeypot] {
      ruby {
        code => '
          h = event.get("honeypot")
          if h.is_a?(Hash)
            h.each { |k, v| event.set(k, v) }
          end
        '
      }
      mutate { remove_field => ["honeypot"] }
    }

    # 2. Some fields come in as strings; coerce types.
    mutate {
      convert => {
        "src_port"      => "integer"
        "dst_port"      => "integer"
        "response_code" => "integer"
      }
    }

    # 3. Normalize boolean auth_success
    if [auth_success] {
      mutate { convert => { "auth_success" => "boolean" } }
    }

    # 4. Ensure src_ip is a string (sometimes Filebeat wraps it)
    if [src_ip] {
      mutate { convert => { "src_ip" => "string" } }
    }

    # 5. GeoIP enrichment on src_ip (uses bundled MaxMind DB)
    if [src_ip] and ![geo] {
      geoip {
        source => "src_ip"
        target => "geo"
        fields => ["country_name", "region_name", "city_name", "location"]
      }
    }

    # 6. Derive an `attack_class` field — a coarse label used by the ML
    #    pipeline. Maps the per-container heuristic to a fixed taxonomy.
    if ![attack_class] {
      ruby {
        code => '
          hint = event.get("attack_type_hint") || "benign"
          mapping = {
            "benign"                => "benign",
            "login_success"         => "benign",
            "recon"                 => "recon",
            "directory_enum"        => "recon",
            "sql_injection"         => "sqli",
            "command_injection"     => "cmdi",
            "ssh_command_injection" => "cmdi",
            "ssh_command_exec"      => "cmdi",
            "xss"                   => "xss",
            "path_traversal"        => "traversal",
            "brute_force_login"     => "bruteforce",
            "ssh_brute_force"       => "bruteforce",
            "ftp_brute_force"       => "bruteforce",
            "telnet_brute_force"    => "bruteforce",
            "ftp_login_success"     => "benign",
            "ftp_connect"           => "recon",
            "ftp_retr"              => "exfil",
            "ftp_stor"              => "implant",
            "telnet_connect"        => "recon",
            "telnet_command_exec"   => "cmdi",
            "ssh_key_attempt"       => "bruteforce",
            "ssh_protocol_error"    => "recon",
            "telnet_error"          => "recon",
            "file_upload"           => "implant",
            "ssrf"                  => "ssrf",
            "printer_abuse"         => "abuse"
          }
          event.set("attack_class", mapping.fetch(hint, "unknown"))
        '
      }
    }

    # 7. Tag the event with the lab id
    mutate { add_field => { "lab_id" => "ai-honeypot-ids" } }

    # 8. Drop noisy Filebeat internal fields we don't need for the demo
    mutate {
      remove_field => [
        "agent", "ecs", "input", "log", "tags",
        "@version", "host"
      ]
    }
  }
}
