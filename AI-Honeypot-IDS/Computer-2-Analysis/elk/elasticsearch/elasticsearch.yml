# Elasticsearch configuration — Computer 2 (air-gapped lab)
cluster.name: honeypot-cluster
node.name: honeypot-node-1
network.host: 0.0.0.0
http.port: 9200

# Single-node lab — no clustering
discovery.type: single-node

# Security disabled for the lab (NEVER do this in production)
xpack.security.enabled: false
xpack.security.transport.ssl.enabled: false
xpack.security.http.ssl.enabled: false

# Monitoring disabled (no Kibana-side MB needed)
xpack.monitoring.enabled: false

# Lock memory
bootstrap.memory_lock: true

# Index lifecycle management — auto-roll honeypot indices daily
action.auto_create_index: "+honeypot-logs-*,+.*-"
