# Filebeat internal logging configuration (referenced by filebeat.yml logging section)
# Kept simple — debug-level logging goes to /var/log/filebeat/filebeat.log
logging.level: info
logging.to_files: true
logging.to_stderr: false
logging.files:
  path: /var/log/filebeat
  name: filebeat.log
  keepfiles: 7
  permissions: 0644
  rotateeverybytes: 10485760   # 10 MB
